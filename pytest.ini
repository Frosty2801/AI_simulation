[pytest]
# Pytest configuration for PetCare Medellín tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers

# Markers
markers =
    integration: Integration tests requiring external services (API, DB, etc.)
    ollama: Tests requiring Ollama to be running
    openai: Tests requiring OpenAI API key

# Coverage (if pytest-cov is installed)
# addopts = --cov=src --cov-report=html

# Timeout for tests (if pytest-timeout is installed)
# timeout = 60